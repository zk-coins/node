name: CI

on:
  push:
    branches: [develop]
  # Only trigger on PRs targeting develop (feature → develop). The
  # release PR (develop → main) is opened automatically and would
  # otherwise fire a second CI run for every push to develop — those
  # duplicate runs surfaced as "fail" entries on the release PR's
  # check list whenever the concurrency block cancelled the older
  # one. The push event already covers develop, and its run is
  # associated with the same SHA on the release PR.
  pull_request:
    branches: [develop]

concurrency:
  group: ci-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  # Force Esplora broadcasts to fail fast in CI. Some unit tests
  # exercise the commit pipeline that ends in a real HTTP broadcast;
  # without this, the runs against the public Mutinynet API can take
  # >60 s per test and tip the job over the timeout.
  ESPLORA_URL: "http://127.0.0.1:1/api"

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Plonky2 requires nightly Rust (`feature(specialization)`); the
      # post-SP1 workspace is unified on a recent nightly. The actual
      # channel is pinned in `rust-toolchain` (this action follows it).
      - name: Install Rust toolchain (nightly via rust-toolchain)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          components: rustfmt, clippy

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run clippy (server + shared, MVP feature set)
        run: cargo clippy -p server -p shared -- -D warnings

      - name: Run clippy (server, all features)
        run: cargo clippy -p server --all-features -- -D warnings

      - name: Run clippy (program-plonky2 + script-plonky2)
        run: cargo clippy -p zkcoins-program-plonky2 -p zkcoins-prover-plonky2 --lib -- -D warnings

      - name: Build server (MVP feature set — the PRD image)
        run: cargo build -p server

      - name: Build server (all features — the DEV image)
        run: cargo build -p server --all-features

  tests:
    name: Tests
    runs-on: ubuntu-latest
    # Plonky2 cyclic-recursion prove tests dominate the runtime: the
    # full `cargo test -p server` set takes ~8 min on M3 Ultra and
    # ~30–45 min on a 7 GB GitHub-hosted runner. Give it 75 min of
    # headroom so a one-off cache miss doesn't trip the timeout.
    timeout-minutes: 75
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain (nightly via rust-toolchain)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # `--test-threads=1` is mandatory: Plonky2 cyclic-recursion test
      # binaries each hold a built `StateTransitionCircuit` (~2 GB
      # resident) and running them in parallel on a 7 GB GitHub-hosted
      # runner OOM-kills the job (exit 143).
      #
      # `--release` is mandatory: the server test set drives the
      # Plonky2 prover end-to-end (account_server_tests.rs::test_wallet_operations
      # and friends). In a debug build each prove takes ~10x longer
      # than release, pushing the full sweep past 75 min on a
      # GitHub-hosted runner. Local M3 Ultra: ~8 min release vs. ~70+
      # min debug.
      - name: Run tests (server + shared, all features)
        run: cargo test -p server -p shared --release --all-features -- --test-threads=1

      # program-plonky2 test sweep runs in --release because the
      # cyclic-recursion prove path is ~10x slower in --debug. Skip
      # the long-running cyclic positives here — they are exercised
      # explicitly in the coverage job below.
      - name: Run tests (program-plonky2, off-circuit + non-cyclic gadgets)
        run: |
          cargo test -p zkcoins-program-plonky2 --release --lib -- --test-threads=1 \
            --skip stage_5b --skip stage_5c --skip stage_5d --skip stage_5e

  coverage:
    name: Coverage (MVP scope)
    runs-on: ubuntu-latest
    # llvm-cov instrumentation slows the prove-bound test set further
    # (roughly 2x vs. the uninstrumented Tests job above). 90 min keeps
    # headroom over the ~60–70 min the full sweep takes on a
    # GitHub-hosted runner.
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain (nightly via rust-toolchain)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          components: llvm-tools-preview

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-llvm-cov-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-llvm-cov-

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      # Coverage is measured on the MVP build only: no Cargo features
      # enabled. Code behind a Cargo feature (address-list / faucet /
      # usernames / lnurl) is excluded from the binary at compile time
      # and is therefore not part of the measured surface.
      #
      # main.rs (runtime bootstrap) and publisher.rs (Bitcoin commit /
      # reveal broadcasting that needs a signet/regtest node) are
      # genuinely not exercisable in unit tests and are excluded at the
      # file level via --ignore-filename-regex.
      # `--release` for the same Plonky2-prove-cost reason as the Tests
      # job above. cargo-llvm-cov gathers line/function coverage data
      # regardless of opt level, so release builds give us the same
      # accuracy at a fraction of the wall time.
      - name: Run cargo-llvm-cov (MVP scope, regression guard)
        run: |
          cargo llvm-cov --release -p server --show-missing-lines \
            --ignore-filename-regex 'main\.rs|publisher\.rs|server_runtime\.rs|scanner_runtime\.rs|_tests\.rs$' \
            --fail-under-lines 100 \
            --fail-under-functions 100 \
            -- --test-threads=1
