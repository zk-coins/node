name: Auto Release PR

on:
  push:
    branches: [develop]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write  # required by `gh label create`

concurrency:
  group: auto-release-pr
  cancel-in-progress: false

jobs:
  create-release-pr:
    name: Create Release PR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch main branch
        run: git fetch origin main

      - name: Check for existing PR
        id: check-pr
        run: |
          PR_COUNT=$(gh pr list --base main --head develop --state open --json number --jq 'length')
          echo "pr_exists=$([[ $PR_COUNT -gt 0 ]] && echo 'true' || echo 'false')" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for differences
        id: check-diff
        if: steps.check-pr.outputs.pr_exists == 'false'
        run: |
          DIFF_COUNT=$(git rev-list --count origin/main..origin/develop)
          echo "has_changes=$([[ $DIFF_COUNT -gt 0 ]] && echo 'true' || echo 'false')" >> $GITHUB_OUTPUT
          echo "commit_count=$DIFF_COUNT" >> $GITHUB_OUTPUT

      - name: Create Release PR
        if: steps.check-pr.outputs.pr_exists == 'false' && steps.check-diff.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMIT_COUNT: ${{ steps.check-diff.outputs.commit_count }}
        run: |
          printf '%s\n' \
            "## Automatic Release PR" \
            "" \
            "**Commits:** ${COMMIT_COUNT} new commit(s)" \
            "" \
            "- [ ] Review all changes" \
            "- [ ] Verify CI passes" \
            "- [ ] Merge when ready for production" \
            > /tmp/pr-body.md

          # `ci:full` opts the PR into the heavy M3 Ultra test + coverage
          # jobs (see ci.yaml). Release PRs are exactly when we want the
          # authoritative gate, so apply it on creation rather than
          # relying on a human to remember the click.
          gh label create ci:full \
            --color FFA500 \
            --description "Run heavy M3 Ultra test + coverage jobs on this PR" \
            2>/dev/null || true

          gh pr create \
            --base main \
            --head develop \
            --title "Release: develop -> main" \
            --label ci:full \
            --body-file /tmp/pr-body.md
